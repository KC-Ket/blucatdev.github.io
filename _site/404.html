<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Blu Cat Dev</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: 6rem;
      font-weight: 700;
      color: var(--cyan);
      line-height: 1;
      margin-bottom: 0.5rem;
      opacity: 0.3;
    }
    .error-page h1 { font-size: 2rem; margin-bottom: 1rem; }
    .error-page p  { color: var(--text-muted); margin-bottom: 2rem; max-width: 400px; }
  </style>
</head>
<body>
  <div class="error-page">
    <p class="error-code">404</p>
    <h1>Page not found</h1>
    <p>This page doesn't exist — or it moved while Krispy was supervising. Either way, let's get you back on track.</p>
    <a href="/" class="btn btn-primary">← Back to Home</a>
  </div>
</body>
</html>
